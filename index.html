<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://reviewping.pro/" />
    <meta property="og:site_name" content="ReviewPing" />
    <title>ReviewPing — Automate Your Google Reviews</title>

    <!-- Meta Description (fallback — overridden by react-helmet-async on JS-enabled clients) -->
    <meta name="description" content="Send AI-personalised review requests via SMS or email. No chasing. No copy-pasting. Built for small businesses. The $19/mo alternative to Podium." />

    <!-- Open Graph / Social Sharing (fallback defaults — per-page via react-helmet-async for JS clients) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ReviewPing — Automate Your Google Reviews" />
    <meta property="og:description" content="Send AI-personalised review requests via SMS or email. No chasing. No copy-pasting. Built for small businesses. The $19/mo alternative to Podium." />
    <meta property="og:url" content="https://reviewping.pro" />
    <meta property="og:image" content="https://reviewping.pro/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReviewPing — Automate Your Google Reviews" />
    <meta name="twitter:description" content="Send AI-personalised review requests via SMS or email. No chasing. No copy-pasting. Built for small businesses." />
    <meta name="twitter:image" content="https://reviewping.pro/og-image.png" />
    <meta name="twitter:image:alt" content="ReviewPing — Automate Your Google Reviews" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ReviewPing",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Send AI-personalised review requests via SMS or email. The $19/mo alternative to Podium.",
      "offers": {
        "@type": "Offer",
        "price": "19",
        "priceCurrency": "USD",
        "description": "Starts at $19/month"
      }
    }
    </script>

    <!-- ⚡ Google Fonts: preconnect to reduce latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;text-align:center;padding:2rem;">
        <div>
          <h1 style="font-size:1.5rem;margin-bottom:0.5rem;">ReviewPing</h1>
          <p style="color:#666;">ReviewPing requires JavaScript to run. Please enable it in your browser.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
