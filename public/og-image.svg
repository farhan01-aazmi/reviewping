<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" rx="0" fill="#0F0F10"/>
  
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F0F10"/>
      <stop offset="0.5" stop-color="#1A1A20"/>
      <stop offset="1" stop-color="#0F0F10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="120" y2="120">
      <stop stop-color="#6C5CE7"/>
      <stop offset="1" stop-color="#7D6FF0"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="100" y2="100">
      <stop stop-color="#00B894"/>
      <stop offset="1" stop-color="#00CEA1"/>
    </linearGradient>
  </defs>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#6C5CE7" opacity="0.06"/>
  <circle cx="100" cy="500" r="250" fill="#00B894" opacity="0.05"/>
  <circle cx="600" cy="315" r="300" fill="#6C5CE7" opacity="0.03"/>

  <!-- Star rating -->
  <g transform="translate(80, 80)">
    <text font-size="22" fill="#FFB800" font-family="sans-serif">★★★★★</text>
    <text font-size="14" fill="#888" font-family="sans-serif" x="145" y="18">Google Reviews</text>
  </g>

  <!-- Main headline -->
  <text x="80" y="210" font-size="62" font-family="Georgia, serif" fill="white" font-weight="bold" letter-spacing="-1">
    Turn happy customers
  </text>
  <text x="80" y="285" font-size="62" font-family="Georgia, serif" fill="white" font-weight="bold" letter-spacing="-1">
    into <tspan fill="#6C5CE7" font-style="italic">5-star reviews.</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="345" font-size="24" fill="#888" font-family="sans-serif">
    AI-personalised SMS &amp; email review requests — automatically.
  </text>

  <!-- Feature pills -->
  <rect x="80" y="380" width="180" height="36" rx="18" fill="#6C5CE7" opacity="0.15"/>
  <text x="170" y="404" font-size="15" fill="#6C5CE7" font-family="sans-serif" text-anchor="middle" font-weight="600">No contract · $19/mo</text>

  <rect x="275" y="380" width="180" height="36" rx="18" fill="#00B894" opacity="0.15"/>
  <text x="365" y="404" font-size="15" fill="#00B894" font-family="sans-serif" text-anchor="middle" font-weight="600">2-minute setup</text>

  <rect x="470" y="380" width="200" height="36" rx="18" fill="#FFB800" opacity="0.15"/>
  <text x="570" y="404" font-size="15" fill="#FFB800" font-family="sans-serif" text-anchor="middle" font-weight="600">AI-powered messages</text>

  <!-- Review card mockup -->
  <rect x="700" y="140" width="420" height="240" rx="16" fill="#1A1A22" stroke="#2A2A35" stroke-width="1"/>
  
  <!-- Review header -->
  <circle cx="740" cy="180" r="20" fill="#6C5CE7" opacity="0.2"/>
  <text x="740" y="186" font-size="16" fill="#6C5CE7" font-family="sans-serif" text-anchor="middle" font-weight="700">JP</text>
  <text x="775" y="179" font-size="16" fill="white" font-family="sans-serif" font-weight="600">James P.</text>
  <text x="775" y="196" font-size="12" fill="#888" font-family="sans-serif">Austin Dental</text>
  
  <!-- Stars -->
  <text x="1010" y="180" font-size="16" fill="#FFB800" font-family="sans-serif">★★★★★</text>
  
  <!-- Quote -->
  <text x="740" y="230" font-size="14" fill="#AAA" font-family="sans-serif">"Absolutely wonderful experience.</text>
  <text x="740" y="250" font-size="14" fill="#AAA" font-family="sans-serif">Would highly recommend."</text>

  <!-- Review card 2 -->
  <rect x="700" y="300" width="420" height="80" rx="12" fill="#1A1A22" stroke="#2A2A35" stroke-width="1"/>
  <circle cx="740" cy="340" r="18" fill="#00B894" opacity="0.2"/>
  <text x="740" y="345" font-size="14" fill="#00B894" font-family="sans-serif" text-anchor="middle" font-weight="700">SM</text>
  <text x="770" y="338" font-size="14" fill="white" font-family="sans-serif" font-weight="600">Sarah M.</text>
  <text x="770" y="354" font-size="11" fill="#888" font-family="sans-serif">London Salon</text>
  <text x="1020" y="340" font-size="14" fill="#FFB800" font-family="sans-serif">★★★★★</text>
  <text x="770" y="372" font-size="12" fill="#AAA" font-family="sans-serif">"Best salon in London, period."</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#6C5CE7" opacity="0.08"/>
  <text x="600" y="612" font-size="16" fill="#888" font-family="sans-serif" text-anchor="middle">
    ReviewPing — Used by 2,400+ businesses in USA &amp; UK
  </text>
</svg>
